name: github action test deployment

on:
  push:
    branches:
      - main
  
  jobs:
    test-deployment:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: ssh login
          uses: appleleboy/ssh-action@v1.0.3
          with:
            host: ${{ secrets.HOST }}
            username: ${{ secrets.USERNAME }}
            key: ${{ secrets.SSH_KEY }}
            scripts:
              cd /
              cd /var/www/github-actions
              git pull origin main
              docker-compose down
              docker-compose up -d --build
